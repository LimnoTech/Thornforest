[workspace]
authors = ["Anthony Aufdenkampe <aaufdenkampe@limno.com>"]
channels = ["conda-forge"]
name = "Thornforest"
platforms = ["osx-arm64", "win-64", "linux-64"]
version = "0.1.0"

[dependencies]
python = "3.13.*"

# Data processing
geopandas = "*"
pyarrow = "*"
python-libarchive-c = ">=5.3,<6"
rioxarray = "*"
xarray = "*"
xvec = "*"
zarr = ">=3"

# Other Geospatial
gdal = "*"
libgdal-arrow-parquet = "*"

# Remote Access
fsspec = "*"
python-dotenv = ">=1.2.2,<2"
s3fs = "*"
universal_pathlib = "*"

# USGS packages for data fetching
dataretrieval = "*"

# HyRiver packages for data fetching
hydrosignatures = ">=0.19"
pygeohydro = ">=0.19"
pygeoogc = ">=0.19"
pynhd = ">=0.19"

# Visualization
hvplot = "*"
geoviews = "*"

# Interactivity via Jupyter Notebooks
jupyter_bokeh = "*"
jupyterlab = "*"
jupytext = "*"

[pypi-dependencies]
# Put pip-only requirements here if needed